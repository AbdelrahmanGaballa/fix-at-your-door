<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 720 220">

  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16e0ff" stop-opacity="1" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="1" />
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Enlarged icon -->
  <g transform="translate(60,35) scale(2)" filter="url(#softGlow)">
    <!-- subtle circular backdrop -->
    <circle cx="25" cy="25" r="30" fill="#1e293b" fill-opacity="0.5" />

    <!-- location pin -->
    <path
      d="M 35 10 C 35 0, 15 0, 15 10 C 15 22, 25 40, 25 40 C 25 40, 35 22, 35 10 Z"
      fill="url(#grad1)" />

    <!-- door -->
    <rect x="18" y="6" width="15" height="20" rx="2" fill="#0f172a" />
    <circle cx="29" cy="16" r="3" fill="#22e7ff" />

    <!-- phone body -->
    <rect x="12" y="45" width="26" height="34" rx="4" fill="url(#grad1)" />
    <rect x="15" y="48" width="20" height="24" rx="2" fill="#0f172a" />

    <!-- repair mark -->
    <line x1="18" y1="54" x2="28" y2="64"
          stroke="#34f5c5" stroke-width="4" stroke-linecap="round" />
    <line x1="28" y1="64" x2="33" y2="52"
          stroke="#34f5c5" stroke-width="4" stroke-linecap="round" />

    <!-- home button -->
    <rect x="21" y="75" width="7" height="3" rx="1.5" fill="#22e7ff" />
  </g>

  <!-- Brand text (shifted a bit left so the x doesn't get clipped) -->
  <g transform="translate(190,120)">
    <text
      x="0"
      y="0"
      font-family="'Poppins', sans-serif"
      font-size="82"
      font-weight="800"
      letter-spacing="-1">
      <tspan fill="#ffffff">at</tspan>
      <tspan fill="url(#grad1)">door</tspan>
      <tspan fill="#10b981">fix</tspan>
    </text>

    <text
      x="5"
      y="40"
      font-family="'Inter', sans-serif"
      font-size="18"
      font-weight="500"
      fill="#7b93b8"
      letter-spacing="3">
      ON-DEMAND PHONE REPAIR
    </text>
  </g>
</svg>
