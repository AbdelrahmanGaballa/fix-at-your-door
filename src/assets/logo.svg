<svg viewBox="0 0 950 260" xmlns="http://www.w3.org/2000/svg" style="background: transparent;">
  <defs>
    <!-- Enhanced gradients -->
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60d5ff"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    
    <!-- Intense neon glow for icon -->
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle text glow -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Stronger glow for FIX -->
    <filter id="fixGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- ===== ICON: Premium glowing A + phone + check ===== -->
  <g transform="translate(5, 30) scale(2.2)" filter="url(#iconGlow)">
    <!-- Outer A / triangle with gradient -->
    <path d="M60 10 L110 115 L10 115 Z"
          fill="none"
          stroke="url(#gradBlue)"
          stroke-width="11"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.95"/>
    
    <!-- Inner glow effect -->
    <path d="M60 20 L100 105 L20 105 Z"
          fill="none"
          stroke="#3be4ff"
          stroke-width="2"
          opacity="0.4"/>
    
    <!-- Phone body with depth -->
    <rect x="40" y="38" width="40" height="60" rx="7"
          fill="#000510"
          stroke="url(#gradBlue)"
          stroke-width="2.5"/>
    
    <!-- Phone screen -->
    <rect x="43" y="43" width="34" height="50" rx="4"
          fill="#0a1628"
          opacity="0.8"/>
    
    <!-- Neon green check with gradient -->
    <polyline points="50,71 61,83 78,57"
              fill="none"
              stroke="url(#gradGreen)"
              stroke-width="6"
              stroke-linecap="round"
              stroke-linejoin="round"/>
    
    <!-- Check inner highlight -->
    <polyline points="50,71 61,83 78,57"
              fill="none"
              stroke="#6fffb0"
              stroke-width="2"
              opacity="0.6"
              stroke-linecap="round"
              stroke-linejoin="round"/>
  </g>
  
  <!-- ===== BRAND TEXT with improved typography ===== -->
  <g transform="translate(200, 115)">
    <!-- "at" in white with subtle glow -->
    <text x="0" y="0"
          font-family="'Poppins', 'Inter', sans-serif"
          font-size="64"
          font-weight="800"
          fill="#ffffff"
          filter="url(#textGlow)">at</text>
    
    <!-- "door" in blue gradient with glow -->
    <text x="78" y="0"
          font-family="'Poppins', 'Inter', sans-serif"
          font-size="64"
          font-weight="800"
          fill="url(#gradBlue)"
          filter="url(#textGlow)">door</text>
    
    <!-- "FIX" in green with strong glow -->
    <text x="268" y="0"
          font-family="'Poppins', 'Inter', sans-serif"
          font-size="64"
          font-weight="800"
          fill="url(#gradGreen)"
          filter="url(#fixGlow)">FIX</text>
    
    <!-- Tagline with better spacing and styling -->
    <text x="2" y="38"
          font-family="'Inter', 'Roboto', sans-serif"
          font-size="15"
          font-weight="600"
          letter-spacing="3.5"
          fill="#7ba3d0"
          opacity="0.85">ON-DEMAND PHONE REPAIR</text>
    
    <!-- Subtle underline accent -->
    <line x1="0" y1="48" x2="140" y2="48"
          stroke="#3b82f6"
          stroke-width="1.5"
          opacity="0.25"/>
  </g>
</svg>