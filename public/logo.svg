<svg viewBox="0 0 950 260" xmlns="http://www.w3.org/2000/svg" style="background: transparent;">
  <defs>
    <!-- Enhanced gradients -->
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60d5ff"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    
    <!-- Intense neon glow for icon -->
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle text glow -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Stronger glow for FIX -->
    <filter id="fixGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- ===== ICON: Premium glowing house/door + phone + tools ===== -->
  <g transform="translate(20, 40) scale(2.0)" filter="url(#iconGlow)">
    <!-- House structure - roof and walls -->
    <path d="M60 15 L110 65 L110 115 L10 115 L10 65 Z"
          fill="rgba(15, 35, 70, 0.5)"
          stroke="url(#gradBlue)"
          stroke-width="9"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    
    <!-- Proper foundation/base platform -->
    <rect x="5" y="115" width="110" height="12"
          fill="url(#gradBlue)"
          stroke="url(#gradBlue)"
          stroke-width="2"
          rx="1"/>
    
    <!-- Inner glow effect -->
    <path d="M60 22 L102 62 L102 108 L18 108 L18 62 Z"
          fill="none"
          stroke="#3be4ff"
          stroke-width="2"
          opacity="0.5"/>
    
    <!-- Door element - centered -->
    <rect x="52" y="80" width="16" height="40"
          fill="none"
          stroke="#3be4ff"
          stroke-width="2.5"
          rx="1"/>
    
    <!-- Door knob -->
    <circle cx="63" cy="100" r="1.5"
            fill="#3be4ff"/>
    
    <!-- Phone body - positioned left of door -->
    <rect x="25" y="50" width="24" height="38" rx="4"
          fill="#000510"
          stroke="url(#gradBlue)"
          stroke-width="2.5"/>
    
    <!-- Phone screen -->
    <rect x="27" y="53" width="20" height="32" rx="2"
          fill="#0a1628"
          opacity="0.8"/>
    
    <!-- Checkmark on phone -->
    <polyline points="31,67 35,71 43,61"
              fill="none"
              stroke="url(#gradGreen)"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"/>
    
    <!-- Check inner highlight -->
    <polyline points="31,67 35,71 43,61"
              fill="none"
              stroke="#6fffb0"
              stroke-width="1.2"
              opacity="0.6"
              stroke-linecap="round"
              stroke-linejoin="round"/>
    
    <!-- Wrench tool - positioned right of door -->
    <g transform="translate(75, 60)">
      <!-- Wrench handle -->
      <line x1="0" y1="0" x2="12" y2="12"
            stroke="url(#gradGreen)"
            stroke-width="3.5"
            stroke-linecap="round"/>
      <!-- Wrench head -->
      <circle cx="0" cy="0" r="3.5"
              fill="none"
              stroke="url(#gradGreen)"
              stroke-width="2.5"/>
      <circle cx="0" cy="0" r="1.5"
              fill="none"
              stroke="#6fffb0"
              stroke-width="1.2"/>
    </g>
  </g>
  
  <!-- ===== BRAND TEXT with improved typography ===== -->
  <g transform="translate(260, 140)">
    <!-- "at" in white with subtle glow -->
    <text x="0" y="0"
          font-family="'Poppins', 'Inter', sans-serif"
          font-size="64"
          font-weight="800"
          fill="#ffffff"
          filter="url(#textGlow)">at</text>
    
    <!-- "door" in blue gradient with glow -->
    <text x="78" y="0"
          font-family="'Poppins', 'Inter', sans-serif"
          font-size="64"
          font-weight="800"
          fill="url(#gradBlue)"
          filter="url(#textGlow)">door</text>
    
    <!-- "FIX" in green with strong glow -->
    <text x="255" y="0"
          font-family="'Poppins', 'Inter', sans-serif"
          font-size="64"
          font-weight="800"
          fill="url(#gradGreen)"
          filter="url(#fixGlow)">FIX</text>
    
    <!-- Tagline with better spacing and styling -->
    <text x="2" y="38"
          font-family="'Inter', 'Roboto', sans-serif"
          font-size="15"
          font-weight="600"
          letter-spacing="3.5"
          fill="#7ba3d0"
          opacity="0.85">ON-DEMAND PHONE REPAIR</text>
    
    <!-- Subtle underline accent -->
    <line x1="0" y1="48" x2="140" y2="48"
          stroke="#3b82f6"
          stroke-width="1.5"
          opacity="0.25"/>
  </g>
</svg>